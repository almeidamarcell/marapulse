name = "marapulse"
main = "src/index.tsx"
compatibility_date = "2024-12-01"

[dev]
port = 8787

[assets]
directory = "./src/static"

[[d1_databases]]
binding = "DB"
database_name = "marapulse-prod"
database_id = "e189c1f5-6ba9-4300-80ff-bb679a3a7c73"

[[kv_namespaces]]
binding = "KV"
id = "7e15da3877c048a7bb85ad6bb1cf6291"

# R2 requires enabling in Cloudflare Dashboard first
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "marapulse-uploads"

# --- Production environment ---
# Fill in real IDs after running:
#   wrangler d1 create marapulse-prod
#   wrangler kv namespace create KV-prod
# Then set secrets:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_PRICE_ID
#   wrangler secret put STRIPE_PRICE_ID_ANNUAL
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put APP_URL

