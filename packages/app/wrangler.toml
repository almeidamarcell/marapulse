name = "marapulse"
main = "src/index.tsx"
compatibility_date = "2024-12-01"

[dev]
port = 8787

[assets]
directory = "./src/static"

[[d1_databases]]
binding = "DB"
database_name = "marapulse-prod"
database_id = "e189c1f5-6ba9-4300-80ff-bb679a3a7c73"

[[kv_namespaces]]
binding = "KV"
id = "7e15da3877c048a7bb85ad6bb1cf6291"

[[r2_buckets]]
binding = "R2"
bucket_name = "marapulse-uploads"

# Secrets are set via: wrangler secret put <NAME>
# Required: RESEND_API_KEY, STRIPE_SECRET_KEY, STRIPE_PRICE_ID,
#           STRIPE_PRICE_ID_ANNUAL, STRIPE_WEBHOOK_SECRET, APP_URL
# Optional: ALERT_WEBHOOK_URL (Slack/generic webhook for 401 spike alerts)
